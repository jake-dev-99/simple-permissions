name: simple_permissions_native
description: "Unified permission handling for Flutter apps. Manages runtime permissions, app roles (SMS, Dialer), and battery optimization."
version: 1.8.0
homepage: https://github.com/simplezen/simple-permissions
repository: https://github.com/simplezen/simple-permissions
issue_tracker: https://github.com/simplezen/simple-permissions/issues

topics:
  - permissions
  - android
  - ios
  - privacy

environment:
  sdk: ^3.6.0
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  simple_permissions_platform_interface: ^1.2.0
  simple_permissions_android: ^1.2.0
  simple_permissions_ios: ^1.2.0
  simple_permissions_macos: ^1.2.0
  simple_permissions_web: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        default_package: simple_permissions_android
      ios:
        default_package: simple_permissions_ios
      macos:
        default_package: simple_permissions_macos
      web:
        default_package: simple_permissions_web
