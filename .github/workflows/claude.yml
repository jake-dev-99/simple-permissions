name: Claude

# Claude Code GitHub Action — listens for PR events and
# responds asynchronously. Two modes:
#
#   1. Auto-fix. When CI fails or a reviewer (human /
#      Copilot / Sourcery) leaves comments, Claude picks up
#      the signal and pushes fix commits to the PR branch.
#
#   2. Interactive. Comments containing "@claude" on the
#      PR, review, or an issue open a conversation — Claude
#      replies, proposes changes, and commits them on
#      request.
#
# ## One-time setup
#
# 1. Install the Claude Code GitHub App on this repo:
#      https://github.com/apps/claude
#    Grant it Contents: Read & write + Pull requests: Read &
#    write on simple-permissions.
#
# 2. Add a repo secret `ANTHROPIC_API_KEY` with a key from
#    https://console.anthropic.com/ — the action authenticates
#    against the Anthropic API on each invocation. Keep the
#    key scoped to CI-only if you care about spend isolation.
#
# Without step 2 every job no-ops cleanly (the action checks
# for the secret up front and exits with a visible message
# rather than failing the run).
on:
  pull_request:
    types: [opened, reopened, synchronize]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]
  workflow_run:
    # Watch CI so we can react to failures. Adjust the
    # workflow list if new ones land.
    workflows: ["CI"]
    types: [completed]

jobs:
  claude:
    # Skip on the auto-tag bot's own commits so Claude isn't
    # arguing with the patch-bump commit from release time.
    if: |
      !(github.event_name == 'pull_request' &&
        github.event.pull_request.user.login == 'github-actions[bot]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      # Required for the OIDC exchange the action uses to
      # authenticate to the GitHub App (no PAT needed).
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # "@claude" in a comment opens a conversation.
          # Change this if the phrase conflicts with anything
          # on this repo.
          trigger_phrase: "@claude"
