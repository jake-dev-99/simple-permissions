name: simple_permissions_web
description: "Web implementation for simple_permissions_native."
version: 1.2.0
homepage: https://github.com/simplezen/simple-permissions
repository: https://github.com/simplezen/simple-permissions

environment:
  sdk: ^3.6.0
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  simple_permissions_platform_interface: ^1.2.0
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    implements: simple_permissions_native
    platforms:
      web:
        pluginClass: SimplePermissionsWeb
        fileName: simple_permissions_web.dart
