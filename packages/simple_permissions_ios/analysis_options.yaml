include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    # pigeon.dart is an ad-hoc codegen script (run via
    # `dart run pigeon`) not compiled into the plugin. It
    # imports pigeon as a dev-only dep; analyzing it in CI
    # requires the `pigeon` package on the classpath, which
    # we deliberately don't pull in at plugin-consumer time.
    - pigeon.dart
  errors:
    unawaited_futures: error
    unused_import: error
    unused_local_variable: error
    dead_code: error
    invalid_null_aware_operator: error

linter:
  rules:
    - prefer_null_aware_operators
    - cancel_subscriptions
    - close_sinks
    - test_types_in_equals
    - throw_in_finally
    - unnecessary_await_in_return
